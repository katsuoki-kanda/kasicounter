<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>下肢動作カウンター Pro Max ver4.2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            color: white;
        }

        .container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { display: none; }
        canvas { 
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh; 
            object-fit: cover; 
            transform: scaleX(-1); 
            opacity: 0.25; 
        }

        .ui-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-box {
            background: rgba(0,0,0,0.8);
            padding: 5px 30px;
            border-radius: 12px;
            font-size: clamp(24px, 4vh, 45px); 
            border: 3px solid;
            font-weight: 900;
        }
        #score-display { color: #00ffcc; border-color: #00ffcc; }
        #timer-display { color: #ff3366; border-color: #ff3366; }

        /* カメラステータスの基本スタイル */
        #camera-status {
            font-size: clamp(18px, 2.8vh, 28px);
            padding: 8px 20px;
            border-radius: 10px;
            background: rgba(0,0,0,0.85);
            text-align: center;
            font-weight: 900;
            border: 4px solid;
            transition: all 0.2s;
        }
        
        /* 条件別の色指定 */
        .status-red { color: #ff3333; border-color: #ff3333 !important; }    /* 赤：顔・足 外 */
        .status-yellow { color: #ffff00; border-color: #ffff00 !important; } /* 黄：顔 外 */
        .status-pink { color: #ff66cc; border-color: #ff66cc !important; }   /* 桃：足 外 */
        .status-green { color: #00ff00; border-color: #00ff00 !important; }  /* 緑：OK */

        .overlay-top {
            position: absolute;
            top: 130px; 
            left: 0;
            width: 100%;
            height: 22vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .overlay-title {
            font-size: clamp(30px, 5vh, 60px);
            margin: 0;
            text-shadow: 0 0 20px #000;
        }

        .overlay-guide {
            font-size: clamp(18px, 2.5vh, 32px);
            color: #00ff00;
            margin-top: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 20px;
            border-radius: 30px;
        }

        .btn-start {
            margin-top: 15px;
            padding: 15px 50px;
            font-size: 24px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
        }

        #counter-grid {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            height: 58vh; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
            pointer-events: none;
        }

        .counter-row { display: flex; gap: 10px; justify-content: center; flex: 1; }

        .counter-item {
            flex: 1;
            background: rgba(30, 30, 30, 0.9);
            border: 4px solid #555;
            border-radius: 15px;
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            padding: 0 10px;
            transition: all 0.1s;
        }

        .counter-item.active {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.3);
            transform: scale(1.02);
        }

        .label {
            font-size: clamp(20px, 4.4vh, 40px); 
            color: #0f0;
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            line-height: 1.2;
        }

        .count-val {
            font-size: clamp(50px, 13vh, 160px);
            color: #fff;
            flex: 1.8;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .item-front { border-color: #3399ff; }
        .item-side { border-color: #ffcc00; }
        .item-back { border-color: #ff6600; }
        .item-special { border-color: #ff33ff; }
        .item-heel { border-color: #00ffcc; }

        #status-msg {
            position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,0,0.8); color: #000; padding: 5px 15px;
            border-radius: 20px; font-size: 16px; z-index: 60; display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="status-msg">READY</div>

        <div class="ui-header">
            <div class="header-left">
                <div id="score-display" class="info-box">SCORE: <span id="val-score">0</span></div>
                <div id="camera-status">全身を映してください</div>
            </div>
            <div id="timer-display" class="info-box">TIME: <span id="val-timer">60</span></div>
        </div>

        <div id="start-screen" class="overlay-top">
            <h1 class="overlay-title">下肢動作カウンター</h1>
            <p class="overlay-guide">片手をあげて下げるとスタート！</p>
            <button class="btn-start" onclick="initApp()">カメラ起動</button>
        </div>

        <div id="result-screen" class="overlay-top" style="display: none;">
            <h1 class="overlay-title" id="finish-text" style="color: #ffcc00;">FINISH!</h1>
            <p class="overlay-guide">手をあげて戻すとリスタート</p>
        </div>

        <div id="counter-grid">
            <div class="counter-row">
                <div id="box-ひだりまえ" class="counter-item item-front"><div class="label">ひだりまえ</div><div class="count-val" id="cnt-ひだりまえ">0</div></div>
                <div id="box-みぎまえ" class="counter-item item-front"><div class="label">みぎまえ</div><div class="count-val" id="cnt-みぎまえ">0</div></div>
            </div>
            <div class="counter-row">
                <div id="box-ひだりよこ" class="counter-item item-side"><div class="label">ひだりよこ</div><div class="count-val" id="cnt-ひだりよこ">0</div></div>
                <div id="box-かかとあげ" class="counter-item item-heel"><div class="label">かかとあげ</div><div class="count-val" id="cnt-かかとあげ">0</div></div>
                <div id="box-みぎよこ" class="counter-item item-side"><div class="label">みぎよこ</div><div class="count-val" id="cnt-みぎよこ">0</div></div>
            </div>
            <div class="counter-row">
                <div id="box-ひだりうしろ" class="counter-item item-back"><div class="label">ひだりうしろ</div><div class="count-val" id="cnt-ひだりうしろ">0</div></div>
                <div id="box-りょうあし" class="counter-item item-special"><div class="label">りょうあし</div><div class="count-val" id="cnt-りょうあし">0</div></div>
                <div id="box-みぎうしろ" class="counter-item item-back"><div class="label">みぎうしろ</div><div class="count-val" id="cnt-みぎうしろ">0</div></div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cameraStatusEl = document.getElementById('camera-status');
        
        const actionCounts = {
            "ひだりまえ": 0, "みぎまえ": 0, "ひだりよこ": 0, "みぎよこ": 0,
            "ひだりうしろ": 0, "みぎうしろ": 0, "りょうあし": 0, "かかとあげ": 0
        };

        let score = 0, timeLeft = 60, gameActive = false;
        let waitingForNeutral = false, isWaitingForReturn = false;
        let needsResetAfterEnd = false; 
        let timerInterval = null, appInitialized = false, lastEndTime = 0;

        const LEG_THRESHOLD_RATIO = 0.82; 
        const KNEE_LIFT_THRESHOLD = 0.08; 
        const KNEE_STAY_THRESHOLD = 0.045; 
        const SIDE_STEP_THRESHOLD = 0.12; 
        const MAX_ANKLE_LATERAL_LIMIT = 0.08; 

        let initialHipAnkleDistL = 0, initialHipAnkleDistR = 0;
        let initialKneeY_L = 0, initialKneeY_R = 0;
        let initialAnkleY_L = 0, initialAnkleY_R = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function recordBasePosition(lm) {
            initialHipAnkleDistL = Math.abs(lm[27].y - lm[23].y);
            initialHipAnkleDistR = Math.abs(lm[28].y - lm[24].y);
            initialKneeY_L = lm[25].y; initialKneeY_R = lm[26].y;
            initialAnkleY_L = lm[27].y; initialAnkleY_R = lm[28].y;
            
            const msg = document.getElementById('status-msg');
            msg.innerText = "CALIBRATED";
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function triggerRealStart(lm) {
            recordBasePosition(lm);
            gameActive = true; 
            waitingForNeutral = false; 
            isWaitingForReturn = false;
            needsResetAfterEnd = false;
            score = 0; timeLeft = 60;
            
            Object.keys(actionCounts).forEach(key => {
                actionCounts[key] = 0;
                document.getElementById(`cnt-${key}`).innerText = "0";
            });
            document.getElementById('val-score').innerText = "0";
            document.getElementById('val-timer').innerText = "60";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('finish-text').innerText = "FINISH!";
            
            playSound(880, 0.4);

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('val-timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame(isManual = false) {
            gameActive = false; 
            clearInterval(timerInterval);
            lastEndTime = Date.now();
            if (isManual) document.getElementById('finish-text').innerText = "RESET!";
            needsResetAfterEnd = true; 
            document.getElementById('result-screen').style.display = 'flex';
            playSound(440, 0.6);
        }

        function incrementCount(action) {
            actionCounts[action]++;
            score++;
            document.getElementById(`cnt-${action}`).innerText = actionCounts[action];
            document.getElementById('val-score').innerText = score;
            const box = document.getElementById(`box-${action}`);
            box.classList.add('active');
            setTimeout(() => box.classList.remove('active'), 300);
            playSound(1200, 0.1);
            isWaitingForReturn = true; 
        }

        // --- ステータス判定ロジック ---
        function updateCameraStatus(lm) {
            if (!lm) {
                cameraStatusEl.innerText = "顔、足が映像外";
                cameraStatusEl.className = "status-red";
                return;
            }

            const nose = lm[0];
            const lAnkle = lm[27];
            const rAnkle = lm[28];

            // ランドマークが画面内(0.0〜1.0)かつ認識精度が高いか
            const isNoseIn = (nose.y > 0 && nose.y < 1) && (nose.x > 0 && nose.x < 1) && nose.visibility > 0.5;
            const isLAnkleIn = (lAnkle.y > 0 && lAnkle.y < 1) && (lAnkle.x > 0 && lAnkle.x < 1) && lAnkle.visibility > 0.5;
            const isRAnkleIn = (rAnkle.y > 0 && rAnkle.y < 1) && (rAnkle.x > 0 && rAnkle.x < 1) && rAnkle.visibility > 0.5;
            const areAnklesIn = isLAnkleIn && isRAnkleIn;

            if (!isNoseIn && !areAnklesIn) {
                // 1. 顔・足の両方が外れている場合
                cameraStatusEl.innerText = "顔、足が映像外";
                cameraStatusEl.className = "status-red";
            } else if (!isNoseIn && areAnklesIn) {
                // 2. 足はあるが顔がない場合
                cameraStatusEl.innerText = "顔が映像外";
                cameraStatusEl.className = "status-yellow";
            } else if (isNoseIn && !areAnklesIn) {
                // 3. 顔はあるが足（片方でも）がない場合
                cameraStatusEl.innerText = "足が映像外";
                cameraStatusEl.className = "status-pink";
            } else {
                // 4. すべて収まっている場合
                cameraStatusEl.innerText = "開始できます";
                cameraStatusEl.className = "status-green";
            }
        }

        function onResults(results) {
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});

                // カメラ状態の更新（今回の追加修正箇所）
                updateCameraStatus(lm);

                const nose = lm[0], lWrist = lm[15], rWrist = lm[16];
                const lAnkle = lm[27], rAnkle = lm[28], lKnee = lm[25], rKnee = lm[26], lHip = lm[23], rHip = lm[24];
                const lHandUp = lWrist.y < nose.y, rHandUp = rWrist.y < nose.y;

                // --- ゲーム制御 ---
                if (gameActive && (lHandUp || rHandUp)) {
                    endGame(true);
                }
                if (needsResetAfterEnd && !lHandUp && !rHandUp) {
                    needsResetAfterEnd = false;
                }
                if (!gameActive && !waitingForNeutral && !needsResetAfterEnd && (lHandUp || rHandUp)) {
                    if (Date.now() - lastEndTime > 1500) {
                        waitingForNeutral = true;
                    }
                }
                if (waitingForNeutral && !lHandUp && !rHandUp) {
                    triggerRealStart(lm);
                }

                // --- 運動計測 ---
                if (gameActive) {
                    const currentDistL = Math.abs(lAnkle.y - lHip.y);
                    const currentDistR = Math.abs(rAnkle.y - rHip.y);
                    const midHipX = (lHip.x + rHip.x) / 2;
                    const lAnkleOffset = lAnkle.x - midHipX; 
                    const rAnkleOffset = midHipX - rAnkle.x;

                    const isLFootBent = currentDistL < (initialHipAnkleDistL * LEG_THRESHOLD_RATIO);
                    const isRFootBent = currentDistR < (initialHipAnkleDistR * LEG_THRESHOLD_RATIO);
                    const isLKneeLifted = lKnee.y < (initialKneeY_L - KNEE_LIFT_THRESHOLD);
                    const isRKneeLifted = rKnee.y < (initialKneeY_R - KNEE_LIFT_THRESHOLD);
                    const isLKneeStatic = Math.abs(lKnee.y - initialKneeY_L) < KNEE_STAY_THRESHOLD;
                    const isRKneeStatic = Math.abs(rKnee.y - initialKneeY_R) < KNEE_STAY_THRESHOLD;

                    const shankDist = (Math.abs(initialAnkleY_L - initialKneeY_L) + Math.abs(initialAnkleY_R - initialKneeY_R)) / 2;
                    const hThreshold = shankDist / 15;
                    const isHeelRaised = (initialKneeY_L - lKnee.y) > hThreshold && (initialKneeY_R - rKnee.y) > hThreshold && Math.abs(lKnee.y - rKnee.y) < 0.04;

                    if (isWaitingForReturn) {
                        if (!isLFootBent && !isRFootBent && isLKneeStatic && isRKneeStatic && !isHeelRaised) {
                            isWaitingForReturn = false;
                        }
                    } else {
                        if (isLFootBent && isRFootBent) {
                            incrementCount("りょうあし");
                        } else if (isLFootBent) {
                            if (isLKneeLifted && lAnkleOffset < MAX_ANKLE_LATERAL_LIMIT && lm[25].z < -0.1) incrementCount("ひだりまえ");
                            else if (lAnkleOffset > SIDE_STEP_THRESHOLD) incrementCount("ひだりよこ");
                            else if (isLKneeStatic && lm[25].z > -0.05 && lm[27].z > 0.25 && lm[27].y < lm[28].y - 0.1) incrementCount("ひだりうしろ");
                        } else if (isRFootBent) {
                            if (isRKneeLifted && rAnkleOffset < MAX_ANKLE_LATERAL_LIMIT && lm[26].z < -0.1) incrementCount("みぎまえ");
                            else if (rAnkleOffset > SIDE_STEP_THRESHOLD) incrementCount("みぎよこ");
                            else if (isRKneeStatic && lm[26].z > -0.05 && lm[28].z > 0.25 && lm[27].y - 0.1 > lm[28].y) incrementCount("みぎうしろ");
                        } else if (isHeelRaised) {
                            incrementCount("かかとあげ");
                        }
                    }
                }
            } else {
                updateCameraStatus(null);
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        function initApp() {
            if (appInitialized) return;
            audioCtx.resume(); appInitialized = true;
            document.querySelector('.btn-start').style.visibility = 'hidden';
            camera.start();
        }
    </script>
</body>
</html>
